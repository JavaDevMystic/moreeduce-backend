spring.application.name=moreeduce

# Database settings
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/moreeduce}
spring.datasource.username=${JDBC_DATABASE_USERNAME:postgres}
spring.datasource.password=${JDBC_DATABASE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Token Settings
token.signing.key=${TOKEN_SIGNING_KEY}
token.access.expiration=${TOKEN_ACCESS_EXPIRATION:86400000}
token.refresh.expiration=${TOKEN_REFRESH_EXPIRATION:259200000}

# Google Cloud Storage Settings
spring.cloud.gcp.core.enabled=false
spring.cloud.gcp.storage.enabled=false
spring.cloud.gcp.storage.auto-create-files=false
gcp.storage.bucket-name=${GCP_STORAGE_BUCKET_NAME:}

# File Upload Limits
spring.servlet.multipart.max-file-size=150MB
spring.servlet.multipart.max-request-size=155MB

# Mail Settings - Gmail SMTP
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=zaripovmuxiddin4@gmail.com
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true


# AI Settings - Google Gemini
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=${GEMINI_API_URL:}

# Render Deploy Fix
server.forward-headers-strategy=framework

# Exception Handling
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# Super Admin Default Credentials
app.super-admin.email=${SUPER_ADMIN_EMAIL}
app.super-admin.password=${SUPER_ADMIN_PASSWORD:superadmin123}